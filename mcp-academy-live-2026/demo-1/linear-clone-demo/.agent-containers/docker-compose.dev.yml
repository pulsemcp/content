services:
  app:
    build:
      context: ..
      dockerfile: .agent-containers/Dockerfile.dev
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    ports:
      - "${APP_PORT:-0}:3000"
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.dev

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: linear_clone_dev
    ports:
      - "${DB_PORT:-0}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  node_modules:
